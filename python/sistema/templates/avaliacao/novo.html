{% extends 'base.html' %}
{% load static %}

{% block title %}Nova Avaliação{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4" style="color:#58a6ff;">⭐ Nova Avaliação</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="{% url 'listar_avaliacoes' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
