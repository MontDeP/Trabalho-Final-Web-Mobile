{% extends 'base.html' %}
{% block title %}Deletar Veículo{% endblock %}
{% block content %}
<h2>Confirmar Exclusão</h2>
<p>Tem certeza que deseja excluir o veículo <strong>{{ veiculo }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmar</button>
    <a href="{% url 'listar_veiculo' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
