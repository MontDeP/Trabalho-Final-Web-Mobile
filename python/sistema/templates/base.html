<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catálogo de Jogos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .navbar { background-color: #161b22 !important; }
        .navbar-brand, .nav-link { color: #58a6ff !important; }
        .nav-link:hover { color: #79c0ff !important; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: #c9d1d9; }
        .btn-primary { background-color: #238636; border-color: #238636; }
        .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
        .table { color: #c9d1d9; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: #161b22; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'listar_jogos' %}">🎮 Catálogo de Jogos</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'listar_jogos' %}">Jogos</a>
            <a class="nav-link" href="{% url 'listar_avaliacoes' %}">Avaliações</a>
            <a class="nav-link text-danger" href="{% url 'logout' %}">Sair</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block conteudo %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
