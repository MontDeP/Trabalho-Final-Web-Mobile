<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Catálogo de Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .card { background-color: #161b22; border: 1px solid #30363d; }
        .form-control { background-color: #0d1117; border-color: #30363d; color: #c9d1d9; }
        .form-control:focus { background-color: #0d1117; color: #c9d1d9; border-color: #58a6ff; box-shadow: none; }
        label { color: #8b949e; }
        .btn-primary { background-color: #238636; border-color: #238636; }
        .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
        .logo-text {
            background: linear-gradient(135deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-img { filter: drop-shadow(0 0 8px rgba(88,166,255,0.5)); }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-3">
            <img src="{% static 'img/logo.svg' %}" alt="Logo" height="52" class="logo-img">
        </div>
        <h4 class="mb-1 text-center logo-text fw-bold">Catálogo de Jogos</h4>
        <p class="text-center small mb-4" style="color:#8b949e;">Faça login para continuar</p>
        {% if erro %}
            <div class="alert alert-danger py-2">{{ erro }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="usuario" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</div>
</body>
</html>
