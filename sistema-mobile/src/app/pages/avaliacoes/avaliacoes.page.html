<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="voltar()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>⭐ Avaliações</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="novaAvaliacao()">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="!carregando; else loading">

    <p *ngIf="itens.length === 0" class="ion-text-center" style="color: var(--ion-color-medium);">
      Nenhuma avaliação cadastrada.
    </p>

    <ion-card *ngFor="let av of itens">
      <ion-card-header>
        <ion-card-subtitle class="jogo-nome">🎮 {{ av.titulo_jogo }}</ion-card-subtitle>
        <ion-card-title>{{ av.titulo }}</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <p class="nota">{{ estrelas(av.nota) }} <strong>{{ av.nota }}/10</strong></p>
        <p class="descricao">{{ av.descricao }}</p>
        <p class="meta">
          <ion-icon name="person-outline"></ion-icon> {{ av.nome_usuario }}
          &nbsp;·&nbsp;
          <ion-icon name="calendar-outline"></ion-icon> {{ formatarData(av.criado_em) }}
        </p>
      </ion-card-content>

      <div class="card-actions">
        <ion-button fill="clear" color="warning" (click)="editarAvaliacao(av.id)">
          <ion-icon name="pencil-outline" slot="start"></ion-icon>
          Editar
        </ion-button>
      </div>
    </ion-card>

  </div>

  <ng-template #loading>
    <div class="ion-text-center ion-padding">
      <ion-spinner></ion-spinner>
      <p>Carregando avaliações...</p>
    </div>
  </ng-template>

</ion-content>
